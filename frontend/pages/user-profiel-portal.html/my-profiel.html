<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff;
      color: #000;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      max-width: 700px;
    }
    .form-section {
      background: #f9f9f9;
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }
    .form-label {
      font-weight: 600;
    }
    input, textarea, select {
      background-color: #fff !important;
      border: 1px solid #ddd !important;
      color: #000 !important;
    }
    input::placeholder, textarea::placeholder {
      color: #888 !important;
    }
    input:hover, textarea:hover, select:hover {
      border-color: #ff6600 !important;
    }
    .btn-primary {
      background-color: #ff6600;
      color: #fff;
      border: none;
    }
    .btn-primary:hover {
      background-color: #000;
      color: #fff;
    }
    .profile-pic-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 2px solid #ddd;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <h2 class="text-center mb-5">My Profile</h2>

    <!-- Profile Picture Upload -->
    <div class="form-section text-center">
      <h5 class="text-center">Profile Picture</h5>
      <img src="https://via.placeholder.com/120" id="profilePreview" class="profile-pic-preview" alt="Profile Picture">
      <div class="mb-3">
        <input type="file" class="form-control" accept="image/*" id="profilePicInput">
      </div>
    </div>

    <!-- Personal Info -->
    <div class="form-section">
      <h5 class="text-center">Personal Information</h5>
      <form id="profileInfoForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="john@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="text" class="form-control" placeholder="+27 123 456 7890">
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-primary px-4">Save Changes</button>
        </div>
      </form>
    </div>

    <!-- Change Password -->
    <div class="form-section">
      <h5 class="text-center">Change Password</h5>
      <form id="passwordForm">
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" class="form-control" placeholder="Enter current password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" placeholder="Enter new password" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" class="form-control" placeholder="Confirm new password" required>
        </div>
        <div class="text-center">
          <button type="submit" class="btn btn-primary px-4">Update Password</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Profile picture preview
    const profileInput = document.getElementById('profilePicInput');
    const previewImg = document.getElementById('profilePreview');

    profileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        previewImg.src = URL.createObjectURL(file);
      }
    });

    // Handle form submissions
    document.getElementById("profileInfoForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("Profile information updated!");
    });

    document.getElementById("passwordForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const passwords = [...e.target.querySelectorAll('input[type="password"]')];
      const [current, newPass, confirm] = passwords.map(p => p.value);

      if (newPass !== confirm) {
        alert("New passwords do not match.");
      } else if (newPass.length < 6) {
        alert("Password must be at least 6 characters.");
      } else {
        alert("Password updated successfully!");
      }
    });
  </script>

</body>
</html>
