<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buy Tickets</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="mb-4">Upcoming Events</h2>

  <!-- Categories -->
  <div class="mb-4">
    <button class="btn btn-outline-dark me-2 filter-btn" data-category="all">All</button>
    <button class="btn btn-outline-dark me-2 filter-btn" data-category="gospel">Gospel</button>
    <button class="btn btn-outline-dark me-2 filter-btn" data-category="conference">Conference</button>
    <button class="btn btn-outline-dark me-2 filter-btn" data-category="live">Live Shows</button>
  </div>

  <!-- Ticket Cards -->
  <div class="row" id="ticket-container">
    <div class="col-md-4 mb-4 ticket-card" data-category="gospel">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">Praise Explosion Night</h5>
          <p class="card-text">A night of powerful worship and praise.</p>
          <p class="fw-bold">R250</p>
          <button class="btn btn-warning buy-btn"
                  onclick="buyTicket('Praise Explosion Night', 250)">
            Buy
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-4 ticket-card" data-category="live">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">Mass Worship Live</h5>
          <p class="card-text">Join us for a live gospel session.</p>
          <p class="fw-bold">R200</p>
          <button class="btn btn-warning buy-btn"
                  onclick="buyTicket('Mass Worship Live', 200)">
            Buy
          </button>
        </div>
      </div>
    </div>
    
    <!-- Add more cards here -->
  </div>
</div>


<script>
  // Category Filtering
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const category = btn.getAttribute('data-category');
      document.querySelectorAll('.ticket-card').forEach(card => {
        const match = category === 'all' || card.dataset.category === category;
        card.style.display = match ? 'block' : 'none';
      });
    });
  });

  // Store selected ticket and redirect
  function buyTicket(name, price) {
    localStorage.setItem('selectedTicket', JSON.stringify({ name, price }));
    window.location.href = 'order-summary.html';
  }
</script>

</body>
</html>
