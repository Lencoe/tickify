<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  /* Custom Colors */
  .accordion-item {
    background-color: white;
    border: 1px solid white;
    color: white;
    transition: all 0.3s ease;
  }

  .accordion-button {
    background-color: white;
    color: white;
    font-weight: bold;
    transition: all 0.3s ease;
  }

  .accordion-button:not(.collapsed):hover,
  .accordion-button:hover {
    color: black;
    border-left: 4px solid orange;
    background-color: white;
  }

  .accordion-button:focus {
    box-shadow: none;
  }

  .accordion-body {
    background-color: white;
    color: black;
  }

  .card {
    background-color: white;
    color: black;
    border: 1px solid white;
    transition: 0.3s ease;
  }

  .card:hover {
    border: 1px solid orange;
  }

  .card .btn-orange {
    background-color: orange;
    color: white;
    border: none;
  }

  .card .btn-orange:hover {
    background-color: #e65c00;
    color: white;
  }

  .card-title {
    font-weight: bold;
  }

  .accordion-header {
    border-bottom: 1px solid #eee;
  }
</style>

<section class="py-5">
  <div class="container">
    <div class="accordion" id="eventCategories">

      <!-- Gospel Category -->
      <div class="accordion-item category gospel">
        <h2 class="accordion-header" id="headingGospel">
          <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#gospelCollapse" aria-expanded="true" aria-controls="gospelCollapse">
            🎤 Live Gospel Events
          </button>
        </h2>
        <div id="gospelCollapse" class="accordion-collapse collapse show" aria-labelledby="headingGospel" data-bs-parent="#eventCategories">
          <div class="accordion-body">
            <div class="row g-4">
              <!-- Card 1 -->
              <div class="col-md-4">
                <div class="card p-2">
                  <img src="../assets/images/gospel1.jpg" class="card-img-top rounded" alt="Gospel Event">
                  <div class="card-body">
                    <h5 class="card-title">Praise Explosion Night</h5>
                    <p class="card-text text-muted">Soweto • 10 August 2025</p>
                    <a href="#" class="btn btn-orange w-100">Buy Ticket</a>
                  </div>
                </div>
              </div>

              <!-- Card 2 -->
              <div class="col-md-4">
                <div class="card p-2">
                  <img src="../assets/images/gospel2.jpg" class="card-img-top rounded" alt="Worship Event">
                  <div class="card-body">
                    <h5 class="card-title">Mass Worship Live</h5>
                    <p class="card-text text-muted">Pretoria • 18 August 2025</p>
                    <a href="#" class="btn btn-orange w-100">Buy Ticket</a>
                  </div>
                </div>
              </div>

              <!-- Card 3 -->
              <div class="col-md-4">
                <div class="card p-2">
                  <img src="../assets/images/gospel3.jpg" class="card-img-top rounded" alt="Church Revival">
                  <div class="card-body">
                    <h5 class="card-title">Revival Weekend</h5>
                    <p class="card-text text-muted">East London • 24 August 2025</p>
                    <a href="#" class="btn btn-orange w-100">Buy Ticket</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- More accordion items below (Concerts, Comedies, Other) as needed... -->

    </div>
  </div>
</section>
