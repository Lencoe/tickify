<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .accordion-item {
      transition: all 0.3s ease;
    }
  </style>
</head>
<body class="p-4">

  <!-- Category Filter Buttons -->
  <div class="mb-4">
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('all')">All Categories</button>
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('gospel')">Gospel</button>
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('comedies')">Live Concerts</button>
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('comedies')">Lifestyle</button>
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('comedies')">Comedy shows</button>
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('comedies')">Sports & Fitness</button>
    <button class="btn btn-outline-primary me-2" onclick="filterCategories('comedies')">Tech & Innovation</button>
    <!-- Add more category buttons if needed -->
  </div>

  <!-- Accordion -->
  <div class="accordion" id="eventCategories">

    <!-- Gospel -->
    <div class="accordion-item category gospel">
      <h2 class="accordion-header" id="headingGospel">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseGospel" aria-expanded="true" aria-controls="collapseGospel">
          🎤 Gospel Events
        </button>
      </h2>
      <div id="collapseGospel" class="accordion-collapse collapse show" aria-labelledby="headingGospel" data-bs-parent="#eventCategories">
        <div class="accordion-body">
          <p>This is a gospel event description.</p>
        </div>
      </div>
    </div>

    <!-- Comedies -->
    <div class="accordion-item category comedies">
      <h2 class="accordion-header" id="headingComedies">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseLive Concerts" aria-expanded="false" aria-controls="collapseLive Concerts">
          😂 Live Concerts
        </button>
      </h2>
      <div id="collapseComedies" class="accordion-collapse collapse" aria-labelledby="headingComedies" data-bs-parent="#eventCategories">
        <div class="accordion-body">
          <p>This is a comedy event description.</p>
        </div>
      </div>
    </div>

    <div class="accordion-item category comedies">
      <h2 class="accordion-header" id="headingComedies">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseComedies" aria-expanded="false" aria-controls="collapseComedies">
          😂 Comedy Events
        </button>
      </h2>
      <div id="collapseComedies" class="accordion-collapse collapse" aria-labelledby="headingComedies" data-bs-parent="#eventCategories">
        <div class="accordion-body">
          <p>This is a comedy event description.</p>
        </div>
      </div>
    </div>
    <!-- Add more accordion-item blocks here for more categories -->

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Filter Script -->
  <script>
    function filterCategories(category) {
      const items = document.querySelectorAll('.accordion-item');

      items.forEach(item => {
        if (category === 'all') {
          item.style.display = 'block';
        } else {
          item.style.display = item.classList.contains(category) ? 'block' : 'none';
        }
      });
    }
  </script>

</body>
</html>
